name: cafef-daily-pages

on:
  schedule:
    - cron: "0 13 * * MON-FRI"  # 13:00 UTC = 20:00 GMT+7 (T2–T6)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cafef-daily-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build cafef outputs
        run: |
          python scripts/build_cafef_zip.py
          ls -lah out

      - name: Prepare Pages content
        run: |
          set -e
          rm -rf public
          mkdir -p public

          # bắt buộc có
          test -f out/latest.json
          test -f out/cafef.zip

          cp -f out/latest.json public/latest.json
          cp -f out/cafef.zip   public/cafef.zip

          # 4 CSV (nếu script đã tạo trong out/)
          # Nếu file thiếu thì fail luôn để bạn biết ngay (không publish nửa vời)
          test -f out/CafeF.INDEX.csv
          test -f out/CafeF.HSX.csv
          test -f out/CafeF.HNX.csv
          test -f out/CafeF.UPCOM.csv

          cp -f out/CafeF.INDEX.csv public/CafeF.INDEX.csv
          cp -f out/CafeF.HSX.csv   public/CafeF.HSX.csv
          cp -f out/CafeF.HNX.csv   public/CafeF.HNX.csv
          cp -f out/CafeF.UPCOM.csv public/CafeF.UPCOM.csv

          # index.html liệt kê link
          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8" />
          <title>cafef-daily</title>
          <h3>cafef-daily</h3>
          <ul>
            <li><a href="latest.json">latest.json</a></li>
            <li><a href="CafeF.INDEX.csv">CafeF.INDEX.csv</a></li>
            <li><a href="CafeF.HSX.csv">CafeF.HSX.csv</a></li>
            <li><a href="CafeF.HNX.csv">CafeF.HNX.csv</a></li>
            <li><a href="CafeF.UPCOM.csv">CafeF.UPCOM.csv</a></li>
            <li><a href="cafef.zip">cafef.zip</a></li>
          </ul>
          HTML

      # Publish ra branch gh-pages
      - name: Publish to gh-pages (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          force_orphan: true

      # (Tuỳ chọn) Giữ Release latest để bạn vẫn có link /releases/download/latest/...
      - name: Create or update release "latest"
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "out/cafef.zip,out/latest.json,out/CafeF.INDEX.csv,out/CafeF.HSX.csv,out/CafeF.HNX.csv,out/CafeF.UPCOM.csv"
          artifactErrorsFailBuild: true
