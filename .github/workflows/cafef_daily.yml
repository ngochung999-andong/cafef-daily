name: cafef-daily

on:
  schedule:
    - cron: "*/10 13-16 * * MON-FRI"   # 20:00-23:59 GMT+7, mỗi 10 phút (T2–T6)
  workflow_dispatch: {}

permissions:
  contents: write     # để update Release
  pages: write        # để deploy GitHub Pages
  id-token: write     # bắt buộc cho deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-release-and-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (Tuỳ chọn nhưng khuyến nghị) Guard: nếu hôm nay đã có latest.json (GMT+7) thì skip
      - name: Guard - skip if already updated today (GMT+7)
        shell: bash
        run: |
          set -e
          TODAY_GMT7=$(TZ=Asia/Ho_Chi_Minh date +%F)
          URL="https://github.com/ngochung999-andong/cafef-daily/releases/download/latest/latest.json"

          echo "TODAY_GMT7=$TODAY_GMT7"
          echo "CHECK=$URL"

          if curl -fsSL "$URL" -o /tmp/latest.json; then
            RUN_DATE=$(grep -oE '"run_time_gmt7"\s*:\s*"[^"]+"' /tmp/latest.json | head -n 1 | sed -E 's/.*"([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')
            echo "LATEST_RUN_DATE=$RUN_DATE"
            if [ "$RUN_DATE" = "$TODAY_GMT7" ]; then
              echo "Already updated today -> skip."
              exit 0
            fi
          else
            echo "latest.json not found yet -> continue."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build cafef.zip
        run: |
          python scripts/build_cafef_zip.py
          ls -lah out

      - name: Create or update release "latest"
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "out/cafef.zip,out/latest.json"
          artifactErrorsFailBuild: true

      # Publish GitHub Pages ngay từ file out/*
      - name: Prepare Pages content
        run: |
          mkdir -p public
          cp -f out/cafef.zip public/cafef.zip
          cp -f out/latest.json public/latest.json
          ls -lah public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
