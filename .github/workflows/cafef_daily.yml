name: cafef-daily

on:
  schedule:
    - cron: "0 14 * * MON-FRI"   # 14:00 UTC = 21:00 GMT+7
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-release-and-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build cafef outputs
        run: |
          python scripts/build_cafef_zip.py
          ls -lah out

      - name: Create or update release "latest"
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "out/cafef.zip,out/latest.json,out/CafeF.HSX.csv,out/CafeF.HNX.csv,out/CafeF.UPCOM.csv,out/CafeF.INDEX.csv"
          artifactErrorsFailBuild: true

      - name: Prepare Pages content
        shell: bash
        run: |
          set -e
          mkdir -p public

          cp -f out/CafeF.HSX.csv   public/CafeF.HSX.csv
          cp -f out/CafeF.HNX.csv   public/CafeF.HNX.csv
          cp -f out/CafeF.UPCOM.csv public/CafeF.UPCOM.csv
          cp -f out/CafeF.INDEX.csv public/CafeF.INDEX.csv
          cp -f out/latest.json     public/latest.json

          cp -f out/cafef.zip public/cafef.zip || true

          cat > public/index.html << 'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>cafef-daily</title>
          <h3>cafef-daily</h3>
          <ul>
            <li><a href="./latest.json">latest.json</a></li>
            <li><a href="./CafeF.INDEX.csv">CafeF.INDEX.csv</a></li>
            <li><a href="./CafeF.HSX.csv">CafeF.HSX.csv</a></li>
            <li><a href="./CafeF.HNX.csv">CafeF.HNX.csv</a></li>
            <li><a href="./CafeF.UPCOM.csv">CafeF.UPCOM.csv</a></li>
            <li><a href="./cafef.zip">cafef.zip</a></li>
          </ul>
          HTML

          ls -lah public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
