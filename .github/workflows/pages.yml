name: pages

on:
  workflow_run:
    workflows: ["cafef-daily"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release assets (cafef.zip, latest.json)
        shell: bash
        run: |
          set -e
          mkdir -p public
          curl -fsSL -o public/cafef.zip  "https://github.com/ngochung999-andong/cafef-daily/releases/download/latest/cafef.zip"
          curl -fsSL -o public/latest.json "https://github.com/ngochung999-andong/cafef-daily/releases/download/latest/latest.json"
          ls -lah public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
